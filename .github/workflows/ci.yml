name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      HUSKY: 0

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build shared packages
        run: npm run build --workspace=@app/types

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build API
        run: npm run build --workspace=@app/api

      - name: Test API
        run: npm run test --workspace=@app/api

      - name: Build web
        run: npm run build --workspace=@app/web
        env:
          VITE_API_URL: http://127.0.0.1:3000
          VITE_BETTER_AUTH_URL: http://127.0.0.1:3000

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Test web
        run: npm run test --workspace=@app/web
        env:
          VITE_API_URL: http://127.0.0.1:3000
          VITE_BETTER_AUTH_URL: http://127.0.0.1:3000
